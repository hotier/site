<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test GitHub OAuth</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      background: #24292e;
      color: white;
      border: none;
      border-radius: 6px;
    }
    button:hover {
      background: #000;
    }
    #result {
      margin-top: 1rem;
      padding: 1rem;
      background: #f6f8fa;
      border-radius: 6px;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .success { color: #28a745; }
    .error { color: #dc3545; }
  </style>
</head>
<body>
  <h1>GitHub OAuth Test</h1>
  <p>This page tests the GitHub OAuth flow for Sveltia CMS.</p>
  
  <button onclick="startAuth()">Test GitHub Login</button>
  
  <div id="result"></div>

  <script>
    const resultDiv = document.getElementById('result');
    
    function log(message, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const colorClass = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      resultDiv.innerHTML += `<div class="${colorClass}">[${time}] ${message}</div>`;
    }
    
    // Listen for postMessage from auth window
    window.addEventListener('message', function(event) {
      log('Received message from: ' + event.origin);
      log('Message data: ' + JSON.stringify(event.data, null, 2), 'success');
      
      if (event.data && event.data.type === 'authorization:github:success') {
        log('Authentication successful!', 'success');
        log('Token: ' + event.data.token.substring(0, 10) + '...');
        log('User: ' + event.data.user.login);
      }
    });
    
    function startAuth() {
      resultDiv.innerHTML = '';
      log('Starting OAuth flow...');
      
      const width = 500;
      const height = 600;
      const left = (screen.width - width) / 2;
      const top = (screen.height - height) / 2;
      
      const authUrl = '/auth';
      log('Opening auth window: ' + authUrl);
      
      const authWindow = window.open(
        authUrl,
        'github-oauth',
        `width=${width},height=${height},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes`
      );
      
      if (!authWindow) {
        log('Failed to open auth window. Please check popup blocker settings.', 'error');
        return;
      }
      
      log('Auth window opened. Waiting for authentication...');
      
      // Check if window is closed
      const checkClosed = setInterval(function() {
        if (authWindow.closed) {
          clearInterval(checkClosed);
          log('Auth window closed.');
        }
      }, 1000);
    }
  </script>
</body>
</html>
