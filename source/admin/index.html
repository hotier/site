    const translateDOM = () => {
      // 按键长度降序排序，确保更长的匹配项先被替换（如 'Edit Slug' 优先于 'Edit'）
      const sortedKeys = Object.keys(i18nDict).sort((a, b) => b.length - a.length);
      
      // 深度遍历所有包含文本的元素
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
      let node;
      while (walker.nextNode()) {
        node = walker.currentNode;
        const text = node.textContent;
        
        // 尝试精确匹配或部分替换
        sortedKeys.forEach(key => {
          if (text.includes(key)) {
            node.textContent = node.textContent.replaceAll(key, i18nDict[key]);
          }
        });
      }
      
      // 针对输入框占位符的特殊处理
      document.querySelectorAll('input[placeholder], textarea[placeholder]').forEach(input => {
        if (i18nDict[input.placeholder]) {
          input.placeholder = i18nDict[input.placeholder];
        }
      });
      
      // 处理可能使用 data-placeholder 或 aria-placeholder 的元素
      document.querySelectorAll('[data-placeholder], [aria-placeholder]').forEach(el => {
        const placeholder = el.getAttribute('data-placeholder') || el.getAttribute('aria-placeholder');
        if (placeholder && i18nDict[placeholder]) {
          el.setAttribute(el.hasAttribute('data-placeholder') ? 'data-placeholder' : 'aria-placeholder', i18nDict[placeholder]);
        }
      });
    };

    // 使用 MutationObserver 持续监控界面变化 (因为 Sveltia 是动态渲染的)
    let isTranslating = false;
    const observer = new MutationObserver((mutations) => {
      // 防止递归调用导致的性能问题
      if (isTranslating) return;
      isTranslating = true;
      
      // 使用 requestAnimationFrame 确保在下一帧执行，避免阻塞渲染
      requestAnimationFrame(() => {
        translateDOM();
        isTranslating = false;
      });
    });

    observer.observe(document.documentElement, {
      childList: true,
      subtree: true,
      characterData: true
    });

    // 初始执行一次
    window.addEventListener('DOMContentLoaded', translateDOM);

    // 保持文件名生成逻辑的兼容性
    window.addEventListener('cms:preSave', ({ detail: { entry } }) => {
      const data = entry.get('data');
      const collection = entry.get('collection');
      
      // 只有在新建文章（没有 path）且没有时间戳时，自动生成 10 位 Unix 时间戳
      if (collection === 'posts' && !data.get('timestamp') && !entry.get('path')) {
        entry.setIn(['data', 'timestamp'], Math.floor(Date.now() / 1000).toString());
      }
    });
  </script>
